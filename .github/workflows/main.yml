name: Main

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}
          architecture: x64

      - name: Prepare Environement
        shell: bash
        run:
          pip install -U pip
          pip install poetry
          poetry config --local
          poetry --version

      - name: Install dependencies
        shell: bash
        run: poetry install

      - name: Run tests
        shell: bash
        run: poetry run coverage run -m pytest
